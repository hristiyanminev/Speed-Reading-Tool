<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#000000" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Speed Reader" />
<meta name="mobile-web-app-capable" content="yes" />
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icon-192.png" />
<title>Speed Reader</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0;
    padding: 0;
    background: #000;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    overflow-x: hidden;
    min-height: 100vh;
    min-height: 100dvh;
  }
  body {
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }

  .shell {
    max-width: 720px;
    margin: 0 auto;
    padding: 1.25rem;
  }

  h1 {
    font-size: 18px;
    font-weight: 500;
    margin: 0 0 1.25rem;
    color: #fff;
    letter-spacing: 0.02em;
  }

  .display {
    background: #000;
    border: 1px solid #222;
    border-radius: 10px;
    padding: 3rem 1rem;
    margin-bottom: 1rem;
    min-height: 180px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .guideline {
    position: absolute;
    top: 50%;
    left: 0;
    right: 0;
    height: 1px;
    background: #1a1a1a;
  }

  .word {
    font-family: "SF Mono", "Courier New", ui-monospace, monospace;
    font-size: 42px;
    font-weight: 500;
    letter-spacing: 0.02em;
    line-height: 1.2;
    display: flex;
    align-items: baseline;
    justify-content: center;
    width: 100%;
    position: relative;
    z-index: 1;
  }
  .word .pre, .word .post { color: #fff; flex: 1; white-space: pre; }
  .word .pre { text-align: right; }
  .word .post { text-align: left; }
  .word .pivot { color: #ff3333; font-weight: 700; }

  .progress-text {
    position: absolute;
    bottom: 12px;
    right: 16px;
    font-size: 12px;
    color: #555;
    font-variant-numeric: tabular-nums;
  }

  .fs-btn {
    position: absolute;
    top: 10px;
    right: 10px;
    background: #1a1a1a;
    border: 1px solid #333;
    color: #fff;
    width: 36px;
    height: 36px;
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
  }
  .fs-btn:active { background: #262626; }

  .bar {
    height: 4px;
    background: #1a1a1a;
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 1.25rem;
  }
  .bar-fill {
    height: 100%;
    width: 0%;
    background: #ff3333;
    transition: width 0.1s linear;
  }

  .controls {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-bottom: 1.25rem;
    flex-wrap: wrap;
  }
  .btn {
    background: #1a1a1a;
    border: 1px solid #333;
    color: #fff;
    padding: 10px 16px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    font-family: inherit;
    min-height: 40px;
  }
  .btn:active { background: #262626; }
  .btn-primary {
    background: #ff3333;
    border-color: #ff3333;
    font-weight: 500;
    min-width: 100px;
  }
  .btn-primary:active { background: #e02020; }

  .slider-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 1rem;
  }
  .slider-row label {
    font-size: 13px;
    color: #999;
    min-width: 70px;
  }
  .slider-row input[type="range"] {
    flex: 1;
    accent-color: #ff3333;
    height: 28px;
  }
  .slider-row .out {
    font-size: 13px;
    font-weight: 500;
    color: #fff;
    min-width: 80px;
    text-align: right;
    font-variant-numeric: tabular-nums;
  }

  .text-area-label {
    font-size: 13px;
    color: #999;
    display: block;
    margin: 1rem 0 6px;
  }
  textarea {
    width: 100%;
    min-height: 140px;
    background: #0a0a0a;
    border: 1px solid #333;
    color: #fff;
    padding: 12px;
    border-radius: 8px;
    font-family: inherit;
    font-size: 15px;
    line-height: 1.5;
    resize: vertical;
  }
  textarea:focus { outline: none; border-color: #555; }

  .hint {
    font-size: 12px;
    color: #666;
    text-align: center;
    margin-top: 1.25rem;
    line-height: 1.7;
  }
  .hint span { color: #999; }

  .install-banner {
    background: #0a0a0a;
    border: 1px solid #ff3333;
    border-radius: 8px;
    padding: 12px 14px;
    margin-bottom: 1rem;
    display: none;
    align-items: center;
    gap: 12px;
    font-size: 13px;
  }
  .install-banner.show { display: flex; }
  .install-banner .msg { flex: 1; color: #ccc; }
  .install-banner button {
    background: #ff3333;
    border: none;
    color: #fff;
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
  }
  .install-banner .dismiss {
    background: transparent;
    color: #666;
    padding: 6px 8px;
  }

  /* Fullscreen overlay */
  .fs-overlay {
    display: none;
  }
  .fs-overlay.active {
    display: block;
    position: fixed;
    inset: 0;
    background: #000;
    z-index: 999999;
    cursor: default;
  }
  .fs-overlay.active.hide-cursor { cursor: none; }
  .fs-overlay .fs-guideline {
    position: absolute;
    top: 50%;
    left: 10%;
    right: 10%;
    height: 1px;
    background: #1a1a1a;
  }
  .fs-word-wrap {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: "SF Mono", "Courier New", ui-monospace, monospace;
    font-weight: 500;
    letter-spacing: 0.02em;
    line-height: 1;
    display: flex;
    align-items: baseline;
    justify-content: center;
    width: 100%;
    text-align: center;
  }
  .fs-word-wrap .pre, .fs-word-wrap .post { color: #fff; flex: 1; white-space: pre; }
  .fs-word-wrap .pre { text-align: right; }
  .fs-word-wrap .post { text-align: left; }
  .fs-word-wrap .pivot { color: #ff3333; font-weight: 700; }

  .fs-controls {
    position: absolute;
    bottom: max(40px, env(safe-area-inset-bottom, 0px));
    left: 50%;
    transform: translateX(-50%);
    background: rgba(20, 20, 20, 0.92);
    border: 1px solid #333;
    border-radius: 12px;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    min-width: 360px;
    max-width: 90vw;
    opacity: 1;
    transition: opacity 0.4s ease;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
  }
  .fs-overlay.hidden-ui .fs-controls { opacity: 0; pointer-events: none; }
  .fs-play {
    background: #ff3333;
    border: none;
    color: #fff;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .fs-speed-label { font-size: 12px; color: #888; white-space: nowrap; }
  .fs-speed-slider { flex: 1; accent-color: #ff3333; min-width: 180px; }
  .fs-speed-out {
    font-size: 13px;
    font-weight: 500;
    color: #fff;
    min-width: 70px;
    text-align: right;
    font-variant-numeric: tabular-nums;
  }

  .fs-exit {
    position: absolute;
    top: max(20px, env(safe-area-inset-top, 0px));
    right: 20px;
    background: rgba(20, 20, 20, 0.92);
    border: 1px solid #333;
    color: #fff;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    opacity: 1;
    transition: opacity 0.4s ease;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
  }
  .fs-overlay.hidden-ui .fs-exit { opacity: 0; pointer-events: none; }

  .fs-progress {
    position: absolute;
    bottom: 0;
    left: 0;
    height: 3px;
    background: #ff3333;
    width: 0%;
    transition: width 0.1s linear;
  }

  @media (max-width: 480px) {
    .shell { padding: 1rem 0.75rem; }
    .word { font-size: 36px; }
    .display { padding: 2.25rem 0.75rem; }
    .btn { padding: 10px 12px; font-size: 13px; }
  }
</style>
</head>
<body>

<div class="shell">
  <h1>Speed Reader</h1>

  <div id="install-banner" class="install-banner">
    <div class="msg">Install this app for fullscreen, offline use.</div>
    <button id="install-btn">Install</button>
    <button id="install-dismiss" class="dismiss">✕</button>
  </div>

  <div class="display" id="display">
    <div class="guideline"></div>
    <div class="word" id="word-el">
      <span class="pre" id="word-pre"></span><span class="pivot" id="word-pivot">—</span><span class="post" id="word-post"></span>
    </div>
    <div class="progress-text" id="progress-text">0 / 0</div>
    <button class="fs-btn" id="btn-fullscreen" title="Fullscreen">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 9V4h5M20 9V4h-5M4 15v5h5M20 15v5h-5"/></svg>
    </button>
  </div>

  <div class="bar"><div class="bar-fill" id="progress-bar"></div></div>

  <div class="controls">
    <button class="btn" id="btn-back">◀ -10</button>
    <button class="btn btn-primary" id="btn-play">Play</button>
    <button class="btn" id="btn-reset">Reset</button>
    <button class="btn" id="btn-fwd">+10 ▶</button>
  </div>

  <div class="slider-row">
    <label>Speed</label>
    <input type="range" id="speed-slider" min="100" max="1000" value="300" step="25" />
    <span class="out" id="speed-out">300 wpm</span>
  </div>

  <div class="slider-row">
    <label>Font size</label>
    <input type="range" id="size-slider" min="24" max="72" value="42" step="2" />
    <span class="out" id="size-out">42 px</span>
  </div>

  <label class="text-area-label" for="text-input">Paste your text here</label>
  <textarea id="text-input" placeholder="Paste any text — article, book chapter, notes — and press Play."></textarea>

  <div class="hint">
    Keyboard: <span>Space</span> play/pause · <span>← →</span> step · <span>↑ ↓</span> speed · <span>F</span> fullscreen
  </div>
</div>

<div id="fs-overlay" class="fs-overlay"></div>

<script>
(function() {
  const textInput = document.getElementById('text-input');
  const wordPre = document.getElementById('word-pre');
  const wordPivot = document.getElementById('word-pivot');
  const wordPost = document.getElementById('word-post');
  const wordEl = document.getElementById('word-el');
  const progressText = document.getElementById('progress-text');
  const progressBar = document.getElementById('progress-bar');
  const btnPlay = document.getElementById('btn-play');
  const btnBack = document.getElementById('btn-back');
  const btnFwd = document.getElementById('btn-fwd');
  const btnReset = document.getElementById('btn-reset');
  const btnFullscreen = document.getElementById('btn-fullscreen');
  const speedSlider = document.getElementById('speed-slider');
  const speedOut = document.getElementById('speed-out');
  const sizeSlider = document.getElementById('size-slider');
  const sizeOut = document.getElementById('size-out');
  const fsOverlay = document.getElementById('fs-overlay');

  let words = [];
  let index = 0;
  let playing = false;
  let timer = null;
  let isFullscreen = false;
  let hideTimer = null;
  let fsEls = null;

  // Restore saved state from previous session
  const saved = {
    text: localStorage.getItem('sr_text') || "Welcome to your speed reader. Paste any text here and press play. The red letter in each word is the optimal recognition point. Focus your eyes there and your brain fills in the rest. Try starting at three hundred words per minute and work your way up. Tap the fullscreen button for a distraction free experience.",
    speed: parseInt(localStorage.getItem('sr_speed') || '300', 10),
    size: parseInt(localStorage.getItem('sr_size') || '42', 10),
    index: parseInt(localStorage.getItem('sr_index') || '0', 10)
  };
  textInput.value = saved.text;
  speedSlider.value = saved.speed;
  speedOut.textContent = saved.speed + ' wpm';
  sizeSlider.value = saved.size;
  sizeOut.textContent = saved.size + ' px';
  wordEl.style.fontSize = saved.size + 'px';

  function getOptimalPivot(word) {
    const len = word.length;
    if (len <= 1) return 0;
    if (len <= 3) return 1;
    if (len <= 5) return 1;
    if (len <= 9) return 2;
    if (len <= 13) return 3;
    return 4;
  }

  function tokenize(text) {
    return text.trim().split(/\s+/).filter(w => w.length > 0);
  }

  function renderWord() {
    const hasWords = words.length > 0 && index < words.length;
    let pre = '', piv = '—', post = '';
    if (hasWords) {
      const word = words[index];
      const pivot = getOptimalPivot(word);
      pre = word.slice(0, pivot);
      piv = word.charAt(pivot);
      post = word.slice(pivot + 1);
    }
    wordPre.textContent = pre;
    wordPivot.textContent = piv;
    wordPost.textContent = post;
    const total = words.length;
    const current = total === 0 ? 0 : index + 1;
    progressText.textContent = current + ' / ' + total;
    const pct = total === 0 ? 0 : (current / total * 100);
    progressBar.style.width = pct + '%';

    if (isFullscreen && fsEls) {
      fsEls.pre.textContent = pre;
      fsEls.pivot.textContent = piv;
      fsEls.post.textContent = post;
      fsEls.progress.style.width = pct + '%';
    }

    localStorage.setItem('sr_index', String(index));
  }

  function getDelay() {
    const wpm = parseInt(speedSlider.value, 10);
    return 60000 / wpm;
  }

  function tick() {
    if (index >= words.length - 1) { pause(); return; }
    index++;
    renderWord();
    const word = words[index];
    let mult = 1;
    if (/[.!?]$/.test(word)) mult = 2.2;
    else if (/[,;:]$/.test(word)) mult = 1.5;
    timer = setTimeout(tick, getDelay() * mult);
  }

  function play() {
    if (words.length === 0) { words = tokenize(textInput.value); index = 0; }
    if (index >= words.length - 1) index = 0;
    playing = true;
    setPlayLabel();
    renderWord();
    timer = setTimeout(tick, getDelay());
  }

  function pause() {
    playing = false;
    setPlayLabel();
    if (timer) { clearTimeout(timer); timer = null; }
  }

  function setPlayLabel() {
    btnPlay.textContent = playing ? 'Pause' : 'Play';
    if (fsEls) {
      fsEls.play.innerHTML = playing
        ? '<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="5" width="4" height="14"/><rect x="14" y="5" width="4" height="14"/></svg>'
        : '<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>';
    }
  }

  function togglePlay() { if (playing) pause(); else play(); }

  function step(n) {
    pause();
    if (words.length === 0) words = tokenize(textInput.value);
    index = Math.max(0, Math.min(words.length - 1, index + n));
    renderWord();
  }

  function reset() {
    pause();
    words = tokenize(textInput.value);
    index = 0;
    renderWord();
  }

  function buildFullscreenUI() {
    fsOverlay.innerHTML = '';

    const guide = document.createElement('div');
    guide.className = 'fs-guideline';
    fsOverlay.appendChild(guide);

    const wrap = document.createElement('div');
    wrap.className = 'fs-word-wrap';
    wrap.innerHTML = '<span class="pre"></span><span class="pivot"></span><span class="post"></span>';
    fsOverlay.appendChild(wrap);

    const exit = document.createElement('button');
    exit.className = 'fs-exit';
    exit.title = 'Exit fullscreen';
    exit.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg>';
    exit.addEventListener('click', exitFullscreen);
    fsOverlay.appendChild(exit);

    const controls = document.createElement('div');
    controls.className = 'fs-controls';

    const playBtn = document.createElement('button');
    playBtn.className = 'fs-play';
    playBtn.addEventListener('click', togglePlay);

    const speedLabel = document.createElement('span');
    speedLabel.className = 'fs-speed-label';
    speedLabel.textContent = 'Speed';

    const slider = document.createElement('input');
    slider.type = 'range';
    slider.min = '100'; slider.max = '1000'; slider.step = '25';
    slider.value = speedSlider.value;
    slider.className = 'fs-speed-slider';
    slider.addEventListener('input', () => {
      speedSlider.value = slider.value;
      speedOut.textContent = slider.value + ' wpm';
      out.textContent = slider.value + ' wpm';
      localStorage.setItem('sr_speed', slider.value);
    });

    const out = document.createElement('span');
    out.className = 'fs-speed-out';
    out.textContent = slider.value + ' wpm';

    controls.appendChild(playBtn);
    controls.appendChild(speedLabel);
    controls.appendChild(slider);
    controls.appendChild(out);
    fsOverlay.appendChild(controls);

    const progress = document.createElement('div');
    progress.className = 'fs-progress';
    fsOverlay.appendChild(progress);

    fsEls = {
      pre: wrap.querySelector('.pre'),
      pivot: wrap.querySelector('.pivot'),
      post: wrap.querySelector('.post'),
      play: playBtn,
      slider: slider,
      speedOut: out,
      progress: progress,
      wrap: wrap
    };
  }

  function sizeFullscreenWord() {
    if (!fsEls) return;
    const vh = window.innerHeight;
    const size = Math.min(160, Math.max(48, Math.round(vh * 0.13)));
    fsEls.wrap.style.fontSize = size + 'px';
  }

  function enterFullscreen() {
    buildFullscreenUI();
    fsOverlay.classList.add('active');
    isFullscreen = true;
    sizeFullscreenWord();
    renderWord();
    setPlayLabel();
    scheduleHide();
    try {
      if (document.documentElement.requestFullscreen) {
        document.documentElement.requestFullscreen().catch(() => {});
      }
    } catch (e) {}
  }

  function exitFullscreen() {
    fsOverlay.classList.remove('active', 'hidden-ui', 'hide-cursor');
    isFullscreen = false;
    fsEls = null;
    if (hideTimer) { clearTimeout(hideTimer); hideTimer = null; }
    try {
      if (document.fullscreenElement && document.exitFullscreen) {
        document.exitFullscreen().catch(() => {});
      }
    } catch (e) {}
    setPlayLabel();
  }

  function scheduleHide() {
    if (hideTimer) clearTimeout(hideTimer);
    fsOverlay.classList.remove('hidden-ui', 'hide-cursor');
    hideTimer = setTimeout(() => {
      fsOverlay.classList.add('hidden-ui', 'hide-cursor');
    }, 2000);
  }

  fsOverlay.addEventListener('mousemove', scheduleHide);
  fsOverlay.addEventListener('touchstart', scheduleHide, { passive: true });
  fsOverlay.addEventListener('click', scheduleHide);
  window.addEventListener('resize', sizeFullscreenWord);
  window.addEventListener('orientationchange', sizeFullscreenWord);

  btnPlay.addEventListener('click', togglePlay);
  btnBack.addEventListener('click', () => step(-10));
  btnFwd.addEventListener('click', () => step(10));
  btnReset.addEventListener('click', reset);
  btnFullscreen.addEventListener('click', enterFullscreen);

  textInput.addEventListener('input', () => {
    words = tokenize(textInput.value);
    index = 0;
    renderWord();
    localStorage.setItem('sr_text', textInput.value);
  });

  speedSlider.addEventListener('input', () => {
    speedOut.textContent = speedSlider.value + ' wpm';
    localStorage.setItem('sr_speed', speedSlider.value);
    if (fsEls) {
      fsEls.slider.value = speedSlider.value;
      fsEls.speedOut.textContent = speedSlider.value + ' wpm';
    }
  });

  sizeSlider.addEventListener('input', () => {
    sizeOut.textContent = sizeSlider.value + ' px';
    wordEl.style.fontSize = sizeSlider.value + 'px';
    localStorage.setItem('sr_size', sizeSlider.value);
  });

  document.addEventListener('keydown', (e) => {
    if (e.target === textInput) return;
    if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
    else if (e.code === 'ArrowLeft') { e.preventDefault(); step(-1); }
    else if (e.code === 'ArrowRight') { e.preventDefault(); step(1); }
    else if (e.code === 'ArrowUp') {
      e.preventDefault();
      speedSlider.value = Math.min(1000, parseInt(speedSlider.value, 10) + 25);
      speedSlider.dispatchEvent(new Event('input'));
    }
    else if (e.code === 'ArrowDown') {
      e.preventDefault();
      speedSlider.value = Math.max(100, parseInt(speedSlider.value, 10) - 25);
      speedSlider.dispatchEvent(new Event('input'));
    }
    else if (e.key === 'f' || e.key === 'F') {
      e.preventDefault();
      if (isFullscreen) exitFullscreen(); else enterFullscreen();
    }
    else if (e.code === 'Escape' && isFullscreen) {
      e.preventDefault();
      exitFullscreen();
    }
  });

  document.addEventListener('fullscreenchange', () => {
    if (!document.fullscreenElement && isFullscreen) exitFullscreen();
  });

  words = tokenize(textInput.value);
  index = Math.max(0, Math.min(words.length - 1, saved.index || 0));
  renderWord();

  // PWA install prompt handling
  let deferredPrompt = null;
  const installBanner = document.getElementById('install-banner');
  const installBtn = document.getElementById('install-btn');
  const installDismiss = document.getElementById('install-dismiss');

  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    if (localStorage.getItem('sr_install_dismissed') !== '1') {
      installBanner.classList.add('show');
    }
  });

  installBtn.addEventListener('click', async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    await deferredPrompt.userChoice;
    deferredPrompt = null;
    installBanner.classList.remove('show');
  });

  installDismiss.addEventListener('click', () => {
    installBanner.classList.remove('show');
    localStorage.setItem('sr_install_dismissed', '1');
  });

  window.addEventListener('appinstalled', () => {
    installBanner.classList.remove('show');
  });

  // Register service worker for offline support
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
